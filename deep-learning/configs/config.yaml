# =============================================================================
# NeuroMove — DB-ATCNet Configuration File
# =============================================================================
# All hyperparameters and settings are defined here.
# Import in your scripts via:
#   import yaml
#   with open('configs/config.yaml') as f:
#       cfg = yaml.safe_load(f)
# =============================================================================

# -----------------------------------------------------------------------------
# Model Architecture
# -----------------------------------------------------------------------------
model:
  n_classes: 2
  in_samples: 600
  attention: cbam           # Options: mha | cbam | None

  # EEGNet Block
  eegn_F1: 16
  eegn_D: 2
  eegn_kernelSize: 64
  eegn_poolSize: 7
  eegn_dropout: 0.3

  # TCN Block
  tcn_depth: 2
  tcn_kernelSize: 4
  tcn_filters: 32
  tcn_dropout: 0.3
  tcn_activation: elu

  # Sliding Window
  n_windows: 5

  # Dropout rates
  drop1: 0.35
  drop2: 0.10
  drop3: 0.15
  drop4: 0.15

  # Depth
  depth1: 2
  depth2: 4

# -----------------------------------------------------------------------------
# Training
# -----------------------------------------------------------------------------
training:
  batch_size: 16
  epochs: 300
  patience: 20
  learning_rate: 0.0009
  random_seed: 42
  optimizer: adam
  loss: categorical_crossentropy
  monitor_metric: val_accuracy

# -----------------------------------------------------------------------------
# Data
# -----------------------------------------------------------------------------
data:
  path: ./dataset
  exclude_subjects: [H, I]
  target_classes: [2, 4]     # 2 = Right Hand, 4 = Left Leg
  class_labels: [Hand, Leg]
  n_channels: 19
  samples_per_trial: 600
  sampling_rate: 200          # Hz

# -----------------------------------------------------------------------------
# Electrode Configuration
# -----------------------------------------------------------------------------
channels:
  all:
    - Fp1
    - Fp2
    - F3
    - F4
    - C3
    - C4
    - P3
    - P4
    - O1
    - O2
    - F7
    - F8
    - T3
    - T4
    - T5
    - T6
    - Fz
    - Cz
    - Pz

  # Top-5 from ablation study (static selection)
  top5_ablation: [Cz, P3, T5, F7, T3]
  top5_indices: [17, 6, 14, 10, 12]

  # Gumbel-Softmax learned selection
  gumbel_k: 5                 # Number of channels to select
  gumbel_temp_start: 1.0      # Starting temperature
  gumbel_temp_end: 0.1        # Final temperature after annealing

# -----------------------------------------------------------------------------
# Results & Output Paths
# -----------------------------------------------------------------------------
paths:
  results_base: ./results
  ablation_results: ./results/ablation_loso
  gumbel_results: ./results/gumbel_selection
  cbam_results: ./results/cbam_channel_selection
  checkpoints: ./results/checkpoints
  figures: ./results/figures

# -----------------------------------------------------------------------------
# FPGA Deployment
# -----------------------------------------------------------------------------
fpga:
  target_board: Xilinx Zynq UltraScale+ ZCU106
  inference_latency_ms: 2.31
  precision: float32          # Pre-quantization
  n_channels_deployed: 5
  deployed_channels: [Cz, P3, T5, F7, F8]
